<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MrBeast Live - Sliding Window Tracker</title>
<style>
    @font-face {
        font-family: 'YouTubeSans';
        src: url('InterDisplay-ExtraBold.ttf') format('truetype');
        font-weight: 400 900;
    }

    body {
        background-color: #000000; 
        color: #ffffff;
        font-family: 'YouTubeSans', 'Roboto', sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        overflow-y: auto;
        overflow-x: hidden;
        padding: 40px 0;
    }

    .content-wrapper {
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 100%;
        animation: swipeUp 1.3s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
    }

    @keyframes swipeUp {
        from { transform: translateY(40px); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
    }

    .header {
        display: flex;
        flex-direction: column; 
        align-items: center;
        gap: 15px; 
        font-size: clamp(14px, 2vw, 22px); 
        font-weight: 500; 
        margin-bottom: clamp(50px, 8vh, 90px);
        text-transform: uppercase;
    }

    .header img {
        width: clamp(150px, 11vw, 150px); 
        height: clamp(150px, 11vw, 150px);
        border-radius: 50%;
        border: 2px solid #ffffff;
    }

    .main-stat-section {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        margin-bottom: clamp(40px, 8vh, 80px);
    }

    .stats-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        row-gap: clamp(65px, 9vh, 85px);
        column-gap: clamp(12px, 6vw, 50px);
        width: 100%;
        max-width: 900px;
        padding: 0 10px;
        box-sizing: border-box;
    }

    .stat-section {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        width: 100%;
    }

    .odometer {
        display: flex;
        align-items: center;
        font-weight: 900; 
        letter-spacing: -1px;
        line-height: 1;
        font-variant-numeric: tabular-nums;
    }

    #sub-odometer { font-size: clamp(50px, 11vw, 115px); }
    .small-odometer { font-size: clamp(23px, 5.5vw, 45px); }
    
    #date-time { font-size: clamp(16px, 3.5vw, 26px); }

    .digit-container {
        overflow: hidden;
        height: 1.1em;
        width: 0.72em; 
        position: relative;
    }

    .digit-roll {
        position: absolute;
        top: 0;
        left: 0;
        transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .digit-roll span {
        display: block;
        line-height: 1.1em;
        text-align: center;
        font-weight: 900;
    }

    .static-char {
        display: flex;
        align-items: center;
        height: 1.1em;
        padding: 0 0.1em;
        text-align: center;
        font-weight: 900;
        white-space: pre;
    }

    .label {
        font-size: clamp(12px, 5vw, 24px);
        color: #ffffff; 
        margin-top: 25px; 
        font-weight: 800; 
        text-transform: uppercase;
        letter-spacing: 1.5px;
        text-align: center;
    }

    #hour-gain-odometer, 
    #day-gain-odometer, 
    #view-hour-gain-odometer, 
    #view-day-gain-odometer { 
        color: #00ff88; 
    }

    .time-section {
        display: flex;
        flex-direction: column;
        align-items: center;
        margin-top: clamp(60px, 10vh, 120px);
        padding-bottom: 40px;
    }
</style>
</head>
<body>

    <div class="content-wrapper">
        <div class="header">
            <img src="https://yt3.googleusercontent.com/nxYrc_1_2f77DoBadyxMTmv7ZpRZapHR5jbuYe7PlPd5cIRJxtNNEYyOC0ZsxaDyJJzXrnJiuDE=s160-c-k-c0x00ffffff-no-rj" alt="MrBeast">
            MrBeast
        </div>

        <div class="main-stat-section">
            <div id="sub-odometer" class="odometer"></div>
            <div class="label">📊 Subscribers (EST)</div>
        </div>

        <div class="stats-grid">
            <div class="stat-section">
                <div id="api-sub-odometer" class="odometer small-odometer"></div>
                <div class="label">📈 Subscribers (API)</div>
            </div>
            <div class="stat-section">
                <div id="milestone-odometer" class="odometer small-odometer"></div>
                <div class="label">🎯 Subscribers Left</div>
            </div>
            <div class="stat-section">
                <div id="hour-gain-odometer" class="odometer small-odometer"></div>
                <div class="label">🚀 Last 60 Mins</div>
            </div>
            <div class="stat-section">
                <div id="day-gain-odometer" class="odometer small-odometer"></div>
                <div class="label">📅 Last 24 Hours</div>
            </div>
            <div class="stat-section">
                <div id="view-hour-gain-odometer" class="odometer small-odometer"></div>
                <div class="label">🔥 Views (Sliding 1H)</div>
            </div>
            <div class="stat-section">
                <div id="view-day-gain-odometer" class="odometer small-odometer"></div>
                <div class="label">🌟 Views (Sliding 24H)</div>
            </div>
            <div class="stat-section">
                <div id="api-view-odometer" class="odometer small-odometer"></div>
                <div class="label">🔍 Total Views (API)</div>
            </div>
            <div class="stat-section">
                <div id="view-odometer" class="odometer small-odometer"></div>
                <div class="label">👀 Total Views (EST)</div>
            </div>
        </div>

        <div class="time-section">
            <div id="date-time" class="odometer"></div>
            <div class="label">🕐 Local Date & Time</div>
        </div>
    </div>

<script>
const API_URL = 'https://api.socialcounts.org/youtube-live-subscriber-count/UCX6OQ3DkcsbYNE6H8uQQuVA';

const state = {
    sub: { lastString: "", element: document.getElementById('sub-odometer') },
    apiSub: { lastString: "", element: document.getElementById('api-sub-odometer') },
    apiView: { lastString: "", element: document.getElementById('api-view-odometer') },
    view: { lastString: "", element: document.getElementById('view-odometer') },
    milestone: { lastString: "", element: document.getElementById('milestone-odometer') },
    hourGain: { lastString: "", element: document.getElementById('hour-gain-odometer') },
    dayGain: { lastString: "", element: document.getElementById('day-gain-odometer') },
    viewHourGain: { lastString: "", element: document.getElementById('view-hour-gain-odometer') },
    viewDayGain: { lastString: "", element: document.getElementById('view-day-gain-odometer') },
    clock: { lastString: "", element: document.getElementById('date-time') }
};

function createDigit() {
    const container = document.createElement('div');
    container.className = 'digit-container';
    const roll = document.createElement('div');
    roll.className = 'digit-roll';
    for (let n = 0; n <= 9; n++) {
        const span = document.createElement('span');
        span.textContent = n;
        roll.appendChild(span);
    }
    container.appendChild(roll);
    return container;
}

function createStaticChar(char) {
    const span = document.createElement('span');
    span.className = 'static-char';
    if (char === ' ') { span.innerHTML = ' '; } 
    else { span.textContent = char; }
    return span;
}

function updateOdometer(type, input) {
    const targetState = state[type];
    if (!targetState || !targetState.element) return;
    
    const isGain = type.toLowerCase().includes('gain');
    let prefix = isGain ? "+" : "";
    
    const currentString = typeof input === 'number' ? prefix + Math.floor(input).toLocaleString('en-US') : input;
    
    if (currentString.length !== targetState.lastString.length) {
        targetState.element.innerHTML = '';
        [...currentString].forEach(char => {
            if (isNaN(parseInt(char, 10))) {
                targetState.element.appendChild(createStaticChar(char));
            } else {
                targetState.element.appendChild(createDigit());
            }
        });
    }

    const digitRolls = targetState.element.querySelectorAll('.digit-roll');
    const digitsOnly = [...currentString].filter(char => !isNaN(parseInt(char, 10)));
    
    digitsOnly.forEach((num, i) => {
        const roll = digitRolls[i];
        if (roll) {
            const targetNum = parseInt(num, 10);
            roll.style.transform = `translateY(-${targetNum * 1.1}em)`;
        }
    });

    targetState.lastString = currentString;
}

// Memory-efficient snapshot function
function saveSnapshot(key, value) {
    let history = JSON.parse(localStorage.getItem(key)) || [];
    const now = Date.now();
    
    // Save a new data point every 60 seconds
    if (history.length === 0 || now - history[history.length - 1].t >= 60000) {
        history.push({ t: now, v: value });
        // Keep 25 hours of data to ensure the 24h lookup always has a reference
        history = history.filter(entry => entry.t > now - 90000000);
        localStorage.setItem(key, JSON.stringify(history));
    }
}

// Sliding window logic: compares NOW to exactly (msAgo) in history
function getSlidingGain(historyKey, currentVal, msAgo) {
    let history = JSON.parse(localStorage.getItem(historyKey)) || [];
    if (history.length === 0) return 0;
    
    const targetTime = Date.now() - msAgo;
    
    // Find the snapshot that is closest to our look-back target (e.g. 11:01 AM for 12:01 PM)
    const oldEntry = history.reduce((prev, curr) => {
        return (Math.abs(curr.t - targetTime) < Math.abs(prev.t - targetTime) ? curr : prev);
    });

    return currentVal - oldEntry.v;
}

async function fetchSubs() {
    try {
        const response = await fetch(API_URL);
        const data = await response.json();
        const estSub = data.counters.estimation.subscriberCount;

        saveSnapshot('subHistory', estSub);

        // Calculate Sliding Gains: 3600000ms (1h) and 86400000ms (24h)
        const hrGain = getSlidingGain('subHistory', estSub, 3600000);
        const dayGain = getSlidingGain('subHistory', estSub, 86400000);
        const nextMilestone = Math.ceil((estSub + 1) / 1000000) * 1000000;

        updateOdometer('sub', estSub);
        updateOdometer('apiSub', data.counters.api.subscriberCount);
        updateOdometer('milestone', nextMilestone - estSub);
        updateOdometer('hourGain', hrGain);
        updateOdometer('dayGain', dayGain);
    } catch (err) { console.error("Sub API Error"); }
}

async function fetchViews() {
    try {
        const response = await fetch(API_URL);
        const data = await response.json();
        const estView = data.counters.estimation.viewCount;

        saveSnapshot('viewHistory', estView);

        const vHrGain = getSlidingGain('viewHistory', estView, 3600000);
        const vDayGain = getSlidingGain('viewHistory', estView, 86400000);

        updateOdometer('apiView', data.counters.api.viewCount);
        updateOdometer('view', estView);
        updateOdometer('viewHourGain', vHrGain);
        updateOdometer('viewDayGain', vDayGain);
    } catch (err) { console.error("View API Error"); }
}

function updateClock() {
    const now = new Date();
    const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
    const months = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
    const timeString = `${days[now.getDay()]}, ${String(now.getDate()).padStart(2, '0')} ${months[now.getMonth()]} ${now.getFullYear()} at ${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}:${String(now.getSeconds()).padStart(2, '0')}`;
    updateOdometer('clock', timeString);
}

fetchSubs();
fetchViews();
updateClock();

setInterval(fetchSubs, 2000); 
setInterval(fetchViews, 5000); 
setInterval(updateClock, 1000);
</script>
</body>
</html>
