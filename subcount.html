<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MrBeast Live - Fixed Alignment</title>
<style>
    @font-face {
        font-family: 'YouTubeSans';
        src: url('InterDisplay-ExtraBold.ttf') format('truetype');
        font-weight: 400 900;
    }

    body {
        background-color: #000000; 
        color: #ffffff;
        font-family: 'YouTubeSans', 'Roboto', sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center; /* Keep body centered */
        min-height: 100vh;
        margin: 0;
        overflow-y: auto;
        overflow-x: hidden;
        padding: 40px 0;
    }

    .content-wrapper {
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 100%;
        max-width: 1000px;
        position: relative;
        /* THE NUDGE: Moves the entire dashboard left without breaking internal layouts */
        left: -20px; 
        animation: swipeUp 1.3s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
    }

    @keyframes swipeUp {
        from { transform: translateY(40px); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
    }

    .header {
        display: flex;
        flex-direction: column; 
        align-items: center;
        gap: 15px; 
        font-size: clamp(14px, 2vw, 22px); 
        font-weight: 500; 
        margin-bottom: clamp(50px, 8vh, 90px);
        text-transform: uppercase;
        /* Counter-nudge the header so the profile pic stays centered to the screen if you prefer */
        position: relative;
        left: 20px; 
    }

    .header img {
        width: clamp(150px, 11vw, 150px); 
        height: clamp(150px, 11vw, 150px);
        border-radius: 50%;
        border: 2px solid #ffffff;
    }

    .main-stat-section {
        display: flex;
        flex-direction: column;
        align-items: center; /* Restore centering */
        justify-content: center;
        width: 100%;
        margin-bottom: clamp(40px, 8vh, 80px);
    }

    .stats-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        row-gap: clamp(65px, 9vh, 85px);
        column-gap: clamp(10px, 4vw, 30px);
        width: 100%;
        padding: 0 20px;
        box-sizing: border-box;
    }

    .stat-section {
        display: flex;
        flex-direction: column;
        align-items: center; /* Restore internal centering */
        justify-content: center;
        width: 100%;
    }

    .odometer {
        display: flex;
        align-items: center;
        justify-content: center; /* Restore centering */
        font-weight: 900; 
        letter-spacing: -1px;
        line-height: 1;
        font-variant-numeric: tabular-nums;
    }

    #sub-odometer { font-size: clamp(50px, 11vw, 115px); }
    .small-odometer { font-size: clamp(25px, 6vw, 50px); }
    #date-time { font-size: clamp(16px, 3.5vw, 24px); }

    .digit-container {
        overflow: hidden;
        height: 1.21em; /* Matches line-height exactly to prevent jumping */
        width: 0.70em; /* Slightly wider to prevent overlapping digits */
        position: relative;
        display: inline-block;
        transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .digit-roll {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1); 
        will-change: transform;
    }

    .digit-roll span {
        display: block;
        line-height: 1.1em; /* Absolute sync with container height */
        text-align: center;
        font-weight: 900;
    }

    .static-char {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        height: 1.1em;
        width: auto; 
        padding: 0 0.05em; 
        font-weight: 900;
        white-space: pre; 
    }

    .label {
        font-size: clamp(14px, 3vw, 20px); 
        color: #ffffff; 
        margin-top: 20px; 
        font-weight: 800; 
        text-transform: uppercase;
        letter-spacing: 1px;
        text-align: center;
        opacity: 0.9;
    }

    #hour-gain-odometer, 
    #day-gain-odometer, 
    #view-hour-gain-odometer, 
    #view-day-gain-odometer { 
        color: #00ff88; 
    }

    .time-section {
        display: flex;
        flex-direction: column;
        align-items: center;
        margin-top: clamp(60px, 10vh, 120px);
        padding-bottom: 40px;
    }
</style>
</head>
<body>

    <div class="content-wrapper">
        <div class="header">
            <img src="https://yt3.googleusercontent.com/nxYrc_1_2f77DoBadyxMTmv7ZpRZapHR5jbuYe7PlPd5cIRJxtNNEYyOC0ZsxaDyJJzXrnJiuDE=s160-c-k-c0x00ffffff-no-rj" alt="MrBeast">
            MrBeast
        </div>

        <div class="main-stat-section">
            <div id="sub-odometer" class="odometer"></div>
            <div class="label">📊 Subscribers (EST)</div>
        </div>

        <div class="stats-grid">
            <div class="stat-section">
                <div id="api-sub-odometer" class="odometer small-odometer"></div>
                <div class="label">📈 Subscribers (API)</div>
            </div>
            <div class="stat-section">
                <div id="milestone-odometer" class="odometer small-odometer"></div>
                <div class="label">🎯 Subscribers Left</div>
            </div>
            <div class="stat-section">
                <div id="hour-gain-odometer" class="odometer small-odometer"></div>
                <div class="label">🚀 Sub Gain (1H)</div>
            </div>
            <div class="stat-section">
                <div id="day-gain-odometer" class="odometer small-odometer"></div>
                <div class="label">📅 Est. Daily Subs</div>
            </div>
            <div class="stat-section">
                <div id="view-hour-gain-odometer" class="odometer small-odometer"></div>
                <div class="label">🔥 View Gain (1H)</div>
            </div>
            <div class="stat-section">
                <div id="view-day-gain-odometer" class="odometer small-odometer"></div>
                <div class="label">🌟 Est. Daily Views</div>
            </div>
            <div class="stat-section">
                <div id="api-view-odometer" class="odometer small-odometer"></div>
                <div class="label">🔍 Total Views (API)</div>
            </div>
            <div class="stat-section">
                <div id="view-odometer" class="odometer small-odometer"></div>
                <div class="label">👀 Total Views (EST)</div>
            </div>
        </div>

        <div class="time-section">
            <div id="date-time" class="odometer"></div>
            <div class="label">🕐 Local Date & Time (24H)</div>
        </div>
    </div>

<script>
// ... (Script remains exactly the same as your working version)
const API_URL = 'https://api.socialcounts.org/youtube-live-subscriber-count/UCX6OQ3DkcsbYNE6H8uQQuVA';
const state = {
    sub: { lastString: "", element: document.getElementById('sub-odometer') },
    apiSub: { lastString: "", element: document.getElementById('api-sub-odometer') },
    apiView: { lastString: "", element: document.getElementById('api-view-odometer') },
    view: { lastString: "", element: document.getElementById('view-odometer') },
    milestone: { lastString: "", element: document.getElementById('milestone-odometer') },
    hourGain: { lastString: "", element: document.getElementById('hour-gain-odometer') },
    dayGain: { lastString: "", element: document.getElementById('day-gain-odometer') },
    viewHourGain: { lastString: "", element: document.getElementById('view-hour-gain-odometer') },
    viewDayGain: { lastString: "", element: document.getElementById('view-day-gain-odometer') },
    clock: { lastString: "", element: document.getElementById('date-time') }
};

function createDigit() {
    const container = document.createElement('div');
    container.className = 'digit-container';
    const roll = document.createElement('div');
    roll.className = 'digit-roll';
    for (let n = 0; n <= 9; n++) {
        const span = document.createElement('span');
        span.textContent = n;
        roll.appendChild(span);
    }
    container.appendChild(roll);
    return container;
}

function createStaticChar(char) {
    const span = document.createElement('span');
    span.className = 'static-char';
    if (char === ' ') { span.innerHTML = ' '; } 
    else { span.textContent = char; }
    return span;
}

function updateOdometer(type, input) {
    const targetState = state[type];
    if (!targetState || !targetState.element) return;
    const isGain = type.toLowerCase().includes('gain');
    const prefix = isGain ? "+" : "";
    const currentString = typeof input === 'number' ? prefix + Math.floor(input).toLocaleString('en-US') : input;
    if (currentString === targetState.lastString) return;
    const currentChars = [...currentString];
    const element = targetState.element;
    if (element.children.length !== currentChars.length) {
        element.innerHTML = '';
        currentChars.forEach(char => {
            if (isNaN(parseInt(char, 10))) { element.appendChild(createStaticChar(char)); } 
            else { element.appendChild(createDigit()); }
        });
    }
    const digitRolls = element.querySelectorAll('.digit-roll');
    let digitIdx = 0;
    currentChars.forEach((char, i) => {
        const isNum = !isNaN(parseInt(char, 10));
        if (isNum) {
            const roll = digitRolls[digitIdx];
            if (roll) {
                const targetNum = parseInt(char, 10);
                roll.style.transform = `translateY(-${targetNum * 1.1}em)`;
            }
            digitIdx++;
        }
    });
    targetState.lastString = currentString;
}

async function fetchSubData() {
    try {
        const response = await fetch(API_URL);
        const data = await response.json();
        const estSub = data.counters.estimation.subscriberCount;
        const now = Date.now();
        let history = JSON.parse(localStorage.getItem('subHistory')) || [];
        history.push({ t: now, c: estSub });
        history = history.filter(entry => entry.t > now - 3700000); 
        localStorage.setItem('subHistory', JSON.stringify(history));
        const hEntry = history.find(e => e.t >= now - 3600000) || history[0];
        const currentHourGain = estSub - hEntry.c;
        const averageDayGain = currentHourGain * 24;
        updateOdometer('sub', estSub);
        updateOdometer('apiSub', data.counters.api.subscriberCount);
        updateOdometer('milestone', (Math.ceil((estSub + 1) / 1000000) * 1000000) - estSub);
        updateOdometer('hourGain', currentHourGain);
        updateOdometer('dayGain', averageDayGain);
    } catch (err) {}
}

async function fetchViewData() {
    try {
        const response = await fetch(API_URL);
        const data = await response.json();
        const estView = data.counters.estimation.viewCount;
        const now = Date.now();
        let vHistory = JSON.parse(localStorage.getItem('viewHistory')) || [];
        vHistory.push({ t: now, c: estView });
        vHistory = vHistory.filter(entry => entry.t > now - 3700000);
        localStorage.setItem('viewHistory', JSON.stringify(vHistory));
        const vhEntry = vHistory.find(e => e.t >= now - 3600000) || vHistory[0];
        const currentViewHourGain = estView - vhEntry.c;
        const averageViewDayGain = currentViewHourGain * 24;
        updateOdometer('apiView', data.counters.api.viewCount);
        updateOdometer('view', estView);
        updateOdometer('viewHourGain', currentViewHourGain);
        updateOdometer('viewDayGain', averageViewDayGain);
    } catch (err) {}
}

function updateClock() {
    const now = new Date();
    const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
    const months = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
    const timeString = `${days[now.getDay()]}, ${String(now.getDate()).padStart(2, '0')} ${months[now.getMonth()]} ${now.getFullYear()} at ${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}:${String(now.getSeconds()).padStart(2, '0')}`;
    updateOdometer('clock', timeString);
}

fetchSubData(); fetchViewData(); updateClock();
setInterval(fetchSubData, 2000); 
setInterval(fetchViewData, 5000); 
setInterval(updateClock, 1000);
</script>
</body>
</html>
