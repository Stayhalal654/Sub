<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MrBeast Live - Rolling Tracker</title>
<style>
    @font-face {
        font-family: 'YouTubeSans';
        src: url('InterDisplay-ExtraBold.ttf') format('truetype');
        font-weight: 400 900;
    }

    body {
        background-color: #000000; 
        color: #ffffff;
        font-family: 'YouTubeSans', 'Roboto', sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        overflow-y: auto;
        overflow-x: hidden;
        padding: 40px 0;
    }

    .content-wrapper {
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 100%;
        animation: swipeUp 1.3s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
    }

    @keyframes swipeUp {
        from { transform: translateY(40px); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
    }

    .header {
        display: flex;
        flex-direction: column; 
        align-items: center;
        gap: 15px; 
        font-size: clamp(14px, 2vw, 22px); 
        font-weight: 500; 
        margin-bottom: clamp(40px, 6vh, 60px);
        text-transform: uppercase;
    }

    .header img {
        width: clamp(120px, 10vw, 140px); 
        height: clamp(120px, 10vw, 140px);
        border-radius: 50%;
        border: 2px solid #ffffff;
    }

    .main-stat-section {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        margin-bottom: clamp(30px, 5vh, 50px);
    }

    .stats-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        row-gap: clamp(30px, 6vh, 50px);
        column-gap: clamp(12px, 6vw, 50px);
        width: 100%;
        max-width: 900px;
        padding: 0 20px;
        box-sizing: border-box;
    }

    .stat-section {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        width: 100%;
    }

    .odometer {
        display: flex;
        align-items: center; 
        font-weight: 900; 
        letter-spacing: -1px;
        line-height: 1;
        font-variant-numeric: tabular-nums;
    }

    #sub-odometer { font-size: clamp(45px, 11vw, 110px); }
    .small-odometer { font-size: clamp(22px, 5vw, 42px); }
    
    #date-time { font-size: clamp(14px, 3.5vw, 22px); }

    .digit-container {
        overflow: hidden;
        height: 1.1em;
        width: 0.72em; 
        position: relative;
    }

    .digit-roll {
        position: absolute;
        top: 0;
        left: 0;
        transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .digit-roll span {
        display: block;
        line-height: 1.1em;
        text-align: center;
        font-weight: 900;
    }

    .static-char {
        display: flex;
        align-items: center;
        height: 1.1em; 
        padding: 0 0.05em;
        text-align: center;
        font-weight: 900;
        white-space: pre;
    }

    .label {
        font-size: clamp(10px, 3.5vw, 16px);
        color: #ffffff; 
        margin-top: 12px; 
        font-weight: 800; 
        text-transform: uppercase;
        letter-spacing: 1.5px;
        text-align: center;
        opacity: 0.7;
    }

    #hour-gain-odometer, #day-gain-odometer { color: #00ff88; }

    .time-section {
        display: flex;
        flex-direction: column;
        align-items: center;
        margin-top: clamp(40px, 7vh, 80px);
        padding-bottom: 40px;
    }
</style>
</head>
<body>

    <div class="content-wrapper">
        <div class="header">
            <img src="http://googleusercontent.com/profile/picture/3" alt="MrBeast">
            MrBeast
        </div>

        <div class="main-stat-section">
            <div id="sub-odometer" class="odometer"></div>
            <div class="label">📊 Subscribers (EST)</div>
        </div>

        <div class="stats-grid">
            <div class="stat-section">
                <div id="api-sub-odometer" class="odometer small-odometer"></div>
                <div class="label">📈 Subscribers (API)</div>
            </div>
            <div class="stat-section">
                <div id="milestone-odometer" class="odometer small-odometer"></div>
                <div class="label">🎯 Subs to 1 Billion</div>
            </div>
            <div class="stat-section">
                <div id="hour-gain-odometer" class="odometer small-odometer"></div>
                <div class="label">🚀 Last 60 Mins</div>
            </div>
            <div class="stat-section">
                <div id="day-gain-odometer" class="odometer small-odometer"></div>
                <div class="label">📅 Last 24 Hours</div>
            </div>
            <div class="stat-section">
                <div id="view-odometer" class="odometer small-odometer"></div>
                <div class="label">👀 Views (EST)</div>
            </div>
            <div class="stat-section">
                <div id="api-view-odometer" class="odometer small-odometer"></div>
                <div class="label">🔍 Views (API)</div>
            </div>
        </div>

        <div class="time-section">
            <div id="date-time" class="odometer"></div>
            <div class="label">🕐 Local Date & Time (24H)</div>
        </div>
    </div>

<script>
const API_URL = 'https://api.socialcounts.org/youtube-live-subscriber-count/UCX6OQ3DkcsbYNE6H8uQQuVA';

const state = {
    sub: { last: "", el: document.getElementById('sub-odometer') },
    apiSub: { last: "", el: document.getElementById('api-sub-odometer') },
    apiView: { last: "", el: document.getElementById('api-view-odometer') },
    view: { last: "", el: document.getElementById('view-odometer') },
    milestone: { last: "", el: document.getElementById('milestone-odometer') },
    hourGain: { last: "", el: document.getElementById('hour-gain-odometer') },
    dayGain: { last: "", el: document.getElementById('day-gain-odometer') },
    clock: { last: "", el: document.getElementById('date-time') }
};

function createDigit() {
    const d = document.createElement('div'); d.className = 'digit-container';
    const r = document.createElement('div'); r.className = 'digit-roll';
    for (let n = 0; n <= 9; n++) {
        const s = document.createElement('span'); s.textContent = n;
        r.appendChild(s);
    }
    d.appendChild(r); return d;
}

function createStatic(c) {
    const s = document.createElement('span'); s.className = 'static-char';
    s.textContent = c; return s;
}

function updateOdo(type, input) {
    const s = state[type];
    let prefix = (type === 'hourGain' || type === 'dayGain') ? "+" : "";
    const str = typeof input === 'number' ? prefix + Math.floor(input).toLocaleString('en-US') : input;
    
    if (str.length !== s.last.length) {
        s.el.innerHTML = '';
        [...str].forEach(c => {
            if (isNaN(parseInt(c, 10))) s.el.appendChild(createStatic(c));
            else s.el.appendChild(createDigit());
        });
    }

    const rolls = s.el.querySelectorAll('.digit-roll');
    const digits = [...str].filter(c => !isNaN(parseInt(c, 10)));
    digits.forEach((n, i) => {
        if (rolls[i]) rolls[i].style.transform = `translateY(-${n * 1.1}em)`;
    });
    s.last = str;
}

async function fetchSubs() {
    try {
        const res = await fetch(API_URL);
        const d = await res.json();
        const est = d.counters.estimation.subscriberCount;
        const now = Date.now();

        // --- ROLLING HISTORY LOGIC ---
        let history = JSON.parse(localStorage.getItem('subHistory')) || [];
        
        // Add current data point
        history.push({ t: now, c: est });

        // Keep only last 24 hours + 5 mins of data to be safe (86700000 ms)
        history = history.filter(entry => entry.t > now - 87000000);
        localStorage.setItem('subHistory', JSON.stringify(history));

        // Find count from 1 hour ago
        const oneHourAgo = now - 3600000;
        const hEntry = history.find(e => e.t >= oneHourAgo) || history[0];
        
        // Find count from 24 hours ago
        const oneDayAgo = now - 86400000;
        const dEntry = history.find(e => e.t >= oneDayAgo) || history[0];

        // Update UI
        updateOdo('sub', est);
        updateOdo('apiSub', d.counters.api.subscriberCount);
        updateOdo('milestone', 1000000000 - est);
        updateOdo('hourGain', est - hEntry.c);
        updateOdo('dayGain', est - dEntry.c);
        
    } catch (e) { console.error("Fetch Error"); }
}

async function fetchViews() {
    try {
        const res = await fetch(API_URL);
        const d = await res.json();
        updateOdo('view', d.counters.estimation.viewCount);
        updateOdo('apiView', d.counters.api.viewCount);
    } catch (e) {}
}

function updateClock() {
    const now = new Date();
    const opt = { weekday:'long', day:'2-digit', month:'long', year:'numeric', hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:false };
    updateOdo('clock', now.toLocaleString('en-GB', opt));
}

// Initial Call
fetchSubs(); fetchViews(); updateClock();

// Intervals
setInterval(fetchSubs, 2000);  
setInterval(fetchViews, 5000); 
setInterval(updateClock, 1000); 
</script>
</body>
</html>
