<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MrBeast Live - Spaced Tracker</title>
<style>
    @font-face {
        font-family: 'YouTubeSans';
        src: url('InterDisplay-ExtraBold.ttf') format('truetype');
        font-weight: 400 900;
    }

    body {
        background-color: #000000; 
        color: #ffffff;
        font-family: 'YouTubeSans', 'Roboto', sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        overflow-x: hidden;
        padding: 60px 0; /* More top/bottom padding */
    }

    .content-wrapper {
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 100%;
        animation: swipeUp 1.3s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
    }

    @keyframes swipeUp {
        from { transform: translateY(40px); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
    }

    .header {
        display: flex;
        flex-direction: column; 
        align-items: center;
        gap: 15px; 
        font-size: 16px; 
        font-weight: 900; 
        margin-bottom: 70px; /* More space below header */
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    .header img {
        width: 130px; 
        height: 130px;
        border-radius: 50%;
        border: 3px solid #00c3ff;
    }

    .main-stat-section {
        display: flex;
        flex-direction: column;
        align-items: center;
        margin-bottom: 80px; /* More space below main sub count */
    }

    .stats-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        row-gap: 70px; /* Vertical gap between rows */
        column-gap: 40px; /* Horizontal gap between columns */
        width: 100%;
        max-width: 900px;
        padding: 0 20px;
    }

    .stat-section {
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    .odometer {
        display: flex;
        align-items: center;
        font-weight: 900; 
        font-variant-numeric: tabular-nums;
    }

    #sub-odometer { font-size: clamp(50px, 12vw, 100px); }
    .small-odometer { font-size: clamp(24px, 6vw, 44px); }
    #date-time { font-size: 20px; margin-top: 80px; }

    .digit-container {
        overflow: hidden;
        height: 1.1em;
        width: 0.72em; /* Increased width for breathing room */
        position: relative;
    }

    .digit-roll {
        position: absolute;
        transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .digit-roll span {
        display: block;
        line-height: 1.1em;
        text-align: center;
    }

    .static-char {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 1.1em;
        font-weight: 900;
        padding: 0 2px; /* Adds space around commas/plus signs */
    }

    .label {
        font-size: 12px;
        color: #aaaaaa; /* Slightly dimmed for better hierarchy */
        margin-top: 18px; /* More space between number and label */
        font-weight: 800; 
        text-transform: uppercase;
        display: flex;
        align-items: center;
        gap: 8px;
        letter-spacing: 1.5px; /* Spaced out text */
    }

    /* Color for Gains */
    .gain-stat { color: #00ff88 !important; }
</style>
</head>
<body>

    <div class="content-wrapper">
        <div class="header">
            <img src="https://yt3.googleusercontent.com/nxYrc_1_2f77DoBadyxMTmv7ZpRZapHR5jbuYe7PlPd5cIRJxtNNEYyOC0ZsxaDyJJzXrnJiuDE=s160-c-k-c0x00ffffff-no-rj" alt="MrBeast">
            MRBEAST
        </div>

        <div class="main-stat-section">
            <div id="sub-odometer" class="odometer"></div>
            <div class="label">📊 SUBSCRIBERS (EST)</div>
        </div>

        <div class="stats-grid">
            <div class="stat-section">
                <div id="api-sub-odometer" class="odometer small-odometer"></div>
                <div class="label">📈 SUBSCRIBERS (API)</div>
            </div>
            <div class="stat-section">
                <div id="milestone-odometer" class="odometer small-odometer"></div>
                <div class="label">🎯 SUBSCRIBERS LEFT</div>
            </div>
            <div class="stat-section">
                <div id="hour-gain-odometer" class="odometer small-odometer gain-stat"></div>
                <div class="label">🚀 LAST 60 MINS</div>
            </div>
            <div class="stat-section">
                <div id="day-gain-odometer" class="odometer small-odometer gain-stat"></div>
                <div class="label">📅 LAST 24 HOURS</div>
            </div>
            <div class="stat-section">
                <div id="view-hour-gain-odometer" class="odometer small-odometer gain-stat"></div>
                <div class="label">🔥 VIEWS (SLIDING 1H)</div>
            </div>
            <div class="stat-section">
                <div id="view-day-gain-odometer" class="odometer small-odometer gain-stat"></div>
                <div class="label">🌟 VIEWS (SLIDING 24H)</div>
            </div>
            <div class="stat-section">
                <div id="api-view-odometer" class="odometer small-odometer"></div>
                <div class="label">🔍 TOTAL VIEWS (API)</div>
            </div>
            <div class="stat-section">
                <div id="view-odometer" class="odometer small-odometer"></div>
                <div class="label">👀 TOTAL VIEWS (EST)</div>
            </div>
        </div>

        <div id="date-time" class="odometer"></div>
        <div class="label">🕐 LOCAL DATE & TIME</div>
    </div>

<script>
// Logic remains identical to your previous version to ensure sliding window works
const API_URL = 'https://api.socialcounts.org/youtube-live-subscriber-count/UCX6OQ3DkcsbYNE6H8uQQuVA';

const state = {
    sub: { lastString: "", element: document.getElementById('sub-odometer') },
    apiSub: { lastString: "", element: document.getElementById('api-sub-odometer') },
    apiView: { lastString: "", element: document.getElementById('api-view-odometer') },
    view: { lastString: "", element: document.getElementById('view-odometer') },
    milestone: { lastString: "", element: document.getElementById('milestone-odometer') },
    hourGain: { lastString: "", element: document.getElementById('hour-gain-odometer') },
    dayGain: { lastString: "", element: document.getElementById('day-gain-odometer') },
    viewHourGain: { lastString: "", element: document.getElementById('view-hour-gain-odometer') },
    viewDayGain: { lastString: "", element: document.getElementById('view-day-gain-odometer') },
    clock: { lastString: "", element: document.getElementById('date-time') }
};

function createDigit() {
    const container = document.createElement('div');
    container.className = 'digit-container';
    const roll = document.createElement('div');
    roll.className = 'digit-roll';
    for (let n = 0; n <= 9; n++) {
        const span = document.createElement('span');
        span.textContent = n;
        roll.appendChild(span);
    }
    container.appendChild(roll);
    return container;
}

function createStaticChar(char) {
    const span = document.createElement('span');
    span.className = 'static-char';
    span.textContent = char;
    return span;
}

function updateOdometer(type, input) {
    const targetState = state[type];
    if (!targetState || !targetState.element) return;
    
    const isGain = type.toLowerCase().includes('gain');
    let currentString = typeof input === 'number' ? (isGain ? "+" : "") + Math.floor(input).toLocaleString('en-US') : input;
    
    if (currentString.length !== targetState.lastString.length) {
        targetState.element.innerHTML = '';
        [...currentString].forEach(char => {
            if (isNaN(parseInt(char, 10))) {
                targetState.element.appendChild(createStaticChar(char));
            } else {
                targetState.element.appendChild(createDigit());
            }
        });
    }

    const digitRolls = targetState.element.querySelectorAll('.digit-roll');
    const digitsOnly = [...currentString].filter(char => !isNaN(parseInt(char, 10)));
    
    digitsOnly.forEach((num, i) => {
        const roll = digitRolls[i];
        if (roll) {
            roll.style.transform = `translateY(-${parseInt(num, 10) * 1.1}em)`;
        }
    });

    targetState.lastString = currentString;
}

function saveSnapshot(key, value) {
    let history = JSON.parse(localStorage.getItem(key)) || [];
    const now = Date.now();
    if (history.length === 0 || now - history[history.length - 1].t >= 60000) {
        history.push({ t: now, v: value });
        history = history.filter(entry => entry.t > now - 90000000);
        localStorage.setItem(key, JSON.stringify(history));
    }
}

function getSlidingGain(historyKey, currentVal, msAgo) {
    let history = JSON.parse(localStorage.getItem(historyKey)) || [];
    if (history.length === 0) return 0;
    
    const targetTime = Date.now() - msAgo;
    const oldEntry = history.reduce((prev, curr) => {
        return (Math.abs(curr.t - targetTime) < Math.abs(prev.t - targetTime) ? curr : prev);
    });

    const gain = currentVal - oldEntry.v;
    return isNaN(gain) ? 0 : gain;
}

async function fetchSubs() {
    try {
        const response = await fetch(API_URL);
        const data = await response.json();
        const estSub = data.counters.estimation.subscriberCount;
        saveSnapshot('subHistory', estSub);
        updateOdometer('sub', estSub);
        updateOdometer('apiSub', data.counters.api.subscriberCount);
        updateOdometer('milestone', (Math.ceil((estSub + 1) / 1000000) * 1000000) - estSub);
        updateOdometer('hourGain', getSlidingGain('subHistory', estSub, 3600000));
        updateOdometer('dayGain', getSlidingGain('subHistory', estSub, 86400000));
    } catch (err) { console.error("Sub Error"); }
}

async function fetchViews() {
    try {
        const response = await fetch(API_URL);
        const data = await response.json();
        const estView = data.counters.estimation.viewCount;
        saveSnapshot('viewHistory', estView);
        updateOdometer('apiView', data.counters.api.viewCount);
        updateOdometer('view', estView);
        updateOdometer('viewHourGain', getSlidingGain('viewHistory', estView, 3600000));
        updateOdometer('viewDayGain', getSlidingGain('viewHistory', estView, 86400000));
    } catch (err) { console.error("View Error"); }
}

function updateClock() {
    const now = new Date();
    const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
    const months = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
    const timeString = `${days[now.getDay()]}, ${String(now.getDate()).padStart(2, '0')} ${months[now.getMonth()]} ${now.getFullYear()} at ${now.toLocaleTimeString('en-GB')}`;
    updateOdometer('clock', timeString);
}

fetchSubs(); fetchViews(); updateClock();
setInterval(fetchSubs, 2000); 
setInterval(fetchViews, 5000); 
setInterval(updateClock, 1000);
</script>
</body>
</html>
